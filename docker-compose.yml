version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - WATCH_PROVIDER_COUNTRY=${WATCH_PROVIDER_COUNTRY:-SE}
      - JWT_SECRET=${JWT_SECRET:-streamcal-super-secret-key-change-me}
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
